feed:
  title: "Lenio Luiz Streck – Consultor Jurídico"
  link: "https://www.conjur.com.br/author/lenio-luiz-streck/"
  description: "Coluna de Lenio Luiz Streck no Consultor Jurídico"
  language: "pt-br"

source:
  url: "https://www.conjur.com.br/author/lenio-luiz-streck/"
  headers:
    User-Agent: "risos/1.0"

selectors:
  item_list:
    css: "article"

  fields:
    title:
      css: "h2"
      attribute: "text"
    link:
      css: "div.text > a"
      attribute: "href"
    description:
      css: "p"
      attribute: "text"
      default: ""
    pubDate:
      css: "div.text > a"
      attribute: "href"
      transforms:
        - type: regex
          pattern: "(\\d{4}-\\w+-\\d{2})"
        - type: replace
          old: "-jan-"
          new: "-01-"
        - type: replace
          old: "-fev-"
          new: "-02-"
        - type: replace
          old: "-mar-"
          new: "-03-"
        - type: replace
          old: "-abr-"
          new: "-04-"
        - type: replace
          old: "-mai-"
          new: "-05-"
        - type: replace
          old: "-jun-"
          new: "-06-"
        - type: replace
          old: "-jul-"
          new: "-07-"
        - type: replace
          old: "-ago-"
          new: "-08-"
        - type: replace
          old: "-set-"
          new: "-09-"
        - type: replace
          old: "-out-"
          new: "-10-"
        - type: replace
          old: "-nov-"
          new: "-11-"
        - type: replace
          old: "-dez-"
          new: "-12-"
        - type: date_parse
    guid:
      css: "div.text > a"
      attribute: "href"
